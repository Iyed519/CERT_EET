# Cert_EET — INF03 (US-INFRA-03) — Base Docker Compose
# Starts api + web + postgres + redis + nginx in the correct order, one command.
#
#   Dev     : docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   Recette : docker compose -f docker-compose.yml -f docker-compose.recette.yml up --build -d
#
# Only nginx is published to the host (80/443). Everything else talks on the
# private docker network. The API waits for Postgres + Redis to be healthy.

name: cert-eet

services:
  postgres:
    image: pgvector/pgvector:pg16          # Postgres 16 + pgvector ready (ADR-04/05, RAG later)
    container_name: cert_eet_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data    # persisted on the host (ADR-07)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [cert_eet_net]

  redis:
    image: redis:7-alpine
    container_name: cert_eet_redis
    command: ["redis-server", "--appendonly", "yes"]   # AOF persistence (ADR-08)
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [cert_eet_net]

  api:
    build:
      context: ./apps/api
      target: production
    container_name: cert_eet_api
    environment:
      NODE_ENV: production
      PORT: 3000
      # --- DB / Redis connection (consumed from US-INFRA-04 onward) ---
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # --- Bootstrap admin (seed INF04) ---
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy        # API waits for DB ready (INF03 acceptance criterion)
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [cert_eet_net]

  web:
    build:
      context: ./apps/web
      target: production
    container_name: cert_eet_web
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_BASE_URL: /api
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [cert_eet_net]

  nginx:
    image: nginx:1.27-alpine
    container_name: cert_eet_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [cert_eet_net]

volumes:
  pgdata:
  redisdata:

networks:
  cert_eet_net:
    driver: bridge
