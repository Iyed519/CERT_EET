# Cert_EET — INF03 (US-INFRA-03) — Nginx reverse proxy
# /     -> web  (Next.js)
# /api/ -> api  (NestJS)        TLS terminated here (self-signed cert in dev)
# Mounted at /etc/nginx/conf.d/default.conf (so it lives inside the default http{} block).

# --- HTTP (port 80): container health probe + redirect everything to HTTPS ---
server {
    listen 80;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS (port 443): TLS termination + routing ---
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ---- API -> NestJS ----
    # Expects the API to serve routes under /api (see the one-line main.ts change in the notes).
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) friendly settings (ADR-03) — used by real-time features later
        proxy_set_header Connection '';
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 3600s;
    }

    # ---- Frontend -> Next.js ----
    location / {
        proxy_pass http://web:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js dev hot-reload (WebSocket) pass-through
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
